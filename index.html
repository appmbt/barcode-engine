<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Implementaciones - Barcodes</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
}

* {
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

/* ===== FULLSCREEN ===== */
.fullscreen-container {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* ===== FONDO ===== */
#background-lottie {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.5;
  pointer-events: none;
}

/* ===== CONTENEDOR ===== */
.central-container {
  position: relative;
  z-index: 2;
  width: 45vw;
  height: 80vh;
  background: rgba(236,236,250,.9);
  border-radius: 45px;
  box-shadow: 0 25px 70px rgba(0,0,0,.35);
  display: flex;
  transition: .5s ease;
  backdrop-filter: blur(12px);
}

.central-container.expandido {
  width: 65vw;
}

/* ===== LOGO ===== */
#logo-mbt {
  position: absolute;
  top: 35px;
  left: 45px;
  width: 115px;
  z-index: 5;
}

/* ===== IZQUIERDA ===== */
.left-panel {
  flex: 1;
  padding: 40px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.central-container.expandido .left-panel {
  border-right: 1px solid rgba(0,0,0,.08);
}

.left-panel h2 {
  margin-bottom: 22px;
  font-size: 25px;
  font-weight: 700;
  color: #44516b;
}

#lottie-bot {
  width: 250px;
  margin-bottom: 22px;
}

.search-container {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.search-container select,
.search-container input {
  width: 60%;
  padding: 10px 14px;
  border-radius: 25px;
  border: 2px solid rgba(57,16,123,.75);
  font-size: 14px;
  margin-bottom: 12px;
}

#folioLabel {
  margin-top: 25px;
  font-weight: 700;
  font-size: 26px;
  color: #2f6dff;
}

/* ===== DERECHA ===== */
.right-panel {
  flex: 1;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 40px 30px;
}

.central-container.expandido .right-panel {
  display: flex;
}

.card {
  display: flex;
  align-items: center;
  gap: 25px;
}

.card .label {
  font-weight: 700;
  font-size: 22px;
  color: #654E69;
}

.card img {
  width: 330px;
  height: 130px;
  background: white;
  padding: 15px;
  border-radius: 15px;
  cursor: zoom-in;
}

/* ===== OVERLAY ===== */
#barcode-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#barcode-overlay img {
  max-width: 90vw;
  max-height: 70vh;
  background: white;
  padding: 20px;
  border-radius: 16px;
}
</style>
</head>

<body>

<div class="fullscreen-container">
  <div id="background-lottie"></div>

  <div class="central-container" id="mainContainer">

    <div id="logo-mbt"></div>

    <!-- IZQUIERDA -->
    <div class="left-panel">
      <h2>Implementaciones Mainbit</h2>
      <div id="lottie-bot"></div>

      <div class="search-container">
        <select id="locationSelect">
          <option value="">Selecciona ubicación</option>
          <option value="Vertiz">Vertiz</option>
          <option value="Ajusco">Ajusco</option>
        </select>

        <input id="folioInput" placeholder="Escribe el cable..." />
      </div>

      <div id="folioLabel"></div>
    </div>

    <!-- DERECHA -->
    <div class="right-panel">
      <div class="card">
        <span class="label">Serie</span>
        <img id="serieBarcode">
      </div>
    </div>

  </div>
</div>

<div id="barcode-overlay">
  <img id="barcode-zoom">
</div>

<script>
/* ===== LOTTIe ===== */
const botContainer = document.getElementById("lottie-bot");
const mainContainer = document.getElementById("mainContainer");
const folioInput = document.getElementById("folioInput");
const folioLabel = document.getElementById("folioLabel");
const locationSelect = document.getElementById("locationSelect");
const serieBarcode = document.getElementById("serieBarcode");

let botAnimation = null;
let timeout = null;

function loadBot(path) {
  if (botAnimation) botAnimation.destroy();
  botAnimation = lottie.loadAnimation({
    container: botContainer,
    path,
    renderer: "svg",
    loop: true,
    autoplay: true
  });
}

loadBot("./Hi_SN_bot.json");

lottie.loadAnimation({
  container: document.getElementById("background-lottie"),
  path: "./background1.json",
  renderer: "canvas",
  loop: true,
  autoplay: true
});

lottie.loadAnimation({
  container: document.getElementById("logo-mbt"),
  path: "./Logo_Mbt_wink.json",
  renderer: "svg",
  loop: true,
  autoplay: true
});

/* ===== DATA ===== */
let baseDatos = [];

fetch("data_imp.csv")
  .then(r => r.text())
  .then(t => {
    baseDatos = t.split("\n").slice(1).map(f => {
      const c = f.split(",");
      return {
        location: c[0]?.trim(),
        cable: c[3]?.trim(),
        serie: c[3]?.trim()
      };
    });
  });

function barcode(valor) {
  return `https://barcodeapi.org/api/code128/${valor}`;
}

/* ===== BUSQUEDA ===== */
folioInput.addEventListener("input", e => {
  const cable = e.target.value.trim();
  const location = locationSelect.value;

  clearTimeout(timeout);

  if (!cable || !location) {
    mainContainer.classList.remove("expandido");
    folioLabel.textContent = "";
    loadBot("./Hi_SN_bot.json");
    return;
  }

  timeout = setTimeout(() => {
    const item = baseDatos.find(x =>
      x.location === location && x.cable === cable
    );

    if (!item) {
      folioLabel.textContent = "No encontrado";
      return;
    }

    mainContainer.classList.add("expandido");
    folioLabel.textContent = item.serie;
    serieBarcode.src = barcode(item.serie);
    loadBot("./Confused_SN_bot.json");
  }, 400);
});

/* ===== ZOOM ===== */
const overlay = document.getElementById("barcode-overlay");
const zoomImg = document.getElementById("barcode-zoom");

document.addEventListener("click", e => {
  if (e.target.tagName === "IMG" && e.target.closest(".card")) {
    zoomImg.src = e.target.src;
    overlay.style.display = "flex";
  }
});

overlay.addEventListener("click", () => {
  overlay.style.display = "none";
  zoomImg.src = "";
});
</script>

</body>
</html>
