<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Implementaciones - Barcodes</title>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

        <style>
            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
                overflow: hidden;
            }

            * {
                box-sizing: border-box;
                font-family: "Segoe UI", Arial, sans-serif;
            }

            .fullscreen-container {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #667eea, #764ba2);
            }

            #background-lottie {
                position: fixed;
                inset: 0;
                z-index: 0;
                opacity: 0.5;
                pointer-events: none;
            }

            .central-container {
                position: relative;
                z-index: 2;
                width: 45vw;
                height: 80vh;
                background: rgba(236, 236, 250, 0.9);
                border-radius: 45px;
                box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
                display: flex;
                transition: 0.5s ease;
            }

            .central-container.expandido {
                width: 65vw;
            }

            #logo-mbt {
                position: absolute;
                top: 35px;
                left: 45px;
                width: 115px;
                z-index: 5;
            }

            .left-panel {
                flex: 1;
                padding: 40px 30px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .central-container.expandido .left-panel {
                border-right: 1px solid rgba(0, 0, 0, 0.08);
            }

            .left-panel h2 {
                margin-bottom: 22px;
                font-size: 25px;
                font-weight: 700;
                color: #44516b;
            }

            #lottie-bot {
                width: 250px;
                margin-bottom: 22px;
            }

            .search-container {
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .search-container select,
            .search-container input {
                text-align: center;
                width: 60%;
                padding: 10px 14px;
                border-radius: 25px;
                border: 2px solid rgba(57, 16, 123, 0.75);
                font-size: 14px;
                margin-bottom: 12px;
            }

            #folioLabel {
                margin-top: 25px;
                font-weight: 700;
                font-size: 26px;
                color: #2f6dff;
            }

            .right-panel {
                flex: 1;
                display: none;
                align-items: center;
                justify-content: center;
                padding: 40px 30px;
            }

            .central-container.expandido .right-panel {
                display: flex;
            }

            .card {
                display: flex;
                align-items: center;
                gap: 25px;
            }

            .card .label {
                font-weight: 700;
                font-size: 22px;
                color: #654e69;
            }

            .card img {
                width: 330px;
                height: 130px;
                background: white;
                padding: 15px;
                border-radius: 15px;
                cursor: zoom-in;
            }

            #barcode-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.75);
                display: none;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }

            #barcode-overlay img {
                max-width: 90vw;
                max-height: 70vh;
                background: white;
                padding: 20px;
                border-radius: 16px;
            }

            /* ===== MOBILE ===== */
            @media (max-width: 768px) {
                /* ✅ PERMITIR SCROLL EN MÓVIL */
                html,
                body {
                    height: auto;
                    overflow-y: auto;
                }

                .fullscreen-container {
                    position: relative;
                    min-height: 100vh;
                    height: auto;
                }

                /* ✅ LOGO RESPONSIVO */
                #logo-mbt {
                    width: 25%;
                    max-width: 70px;
                    min-width: 40px;
                    left: 25px;
                    top: 20px;
                }

                /* ✅ CONTENEDOR VERTICAL */
                .central-container,
                .central-container.expandido {
                    width: 95vw;
                    height: auto;
                    min-height: 85vh;
                    flex-direction: column;
                    padding-bottom: 20px;
                }

                .left-panel {
                    border-right: none !important;
                    padding-bottom: 15px;
                }

                /* ✅ PANEL DERECHO OCULTO AL INICIO */
                .right-panel {
                    display: none;
                    padding: 10px 20px 30px;
                }

                /* ✅ MOSTRAR RESULTADO SOLO CUANDO HAY MATCH */
                .central-container.expandido .right-panel {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                }

                /* ✅ INPUTS MÁS ANCHOS EN MÓVIL */
                .search-container select,
                .search-container input {
                    width: 90%;
                }

                /* ✅ TARJETA VERTICAL */
                .card {
                    flex-direction: column;
                    align-items: center;
                    text-align: center;
                    gap: 15px;
                }

                .card .label {
                    text-align: center;
                    min-width: auto;
                }

                .card img {
                    width: 100%;
                    max-width: 330px;
                    height: auto;
                }
            }
        </style>
    </head>

    <body>
        <div class="fullscreen-container">
            <div id="background-lottie"></div>

            <div class="central-container" id="mainContainer">
                <div id="logo-mbt"></div>

                <div class="left-panel">
                    <h2>Implementaciones Mainbit</h2>
                    <div id="lottie-bot"></div>

                    <div class="search-container">
                        <select id="locationSelect">
                            <option value="">Selecciona una ubicación</option>
                            <option value="Vertiz">Vertiz</option>
                            <option value="Ajusco">Ajusco</option>
                        </select>

                        <input id="folioInput" placeholder="Ingresa la serie del cable para generar el código..." />
                    </div>

                    <div id="folioLabel"></div>
                </div>

                <div class="right-panel">
                    <div class="card">
                        <span class="label">Serie</span>
                        <img id="serieBarcode" />
                    </div>
                </div>
            </div>
        </div>

        <div id="barcode-overlay">
            <img id="barcode-zoom" />
        </div>

        <script>
            /* ===== LOTTIE ===== */
            const botContainer = document.getElementById("lottie-bot");
            const mainContainer = document.getElementById("mainContainer");
            const folioInput = document.getElementById("folioInput");
            const folioLabel = document.getElementById("folioLabel");
            const locationSelect = document.getElementById("locationSelect");
            const serieBarcode = document.getElementById("serieBarcode");

            let botAnimation = null;
            let timeout = null;

            function loadBot(path) {
                if (botAnimation) botAnimation.destroy();
                botAnimation = lottie.loadAnimation({
                    container: botContainer,
                    path,
                    renderer: "svg",
                    loop: true,
                    autoplay: true,
                });
            }

            loadBot("./Hi_SN_bot.json");

            /* ===== DATA ===== */
            let baseDatos = [];

            fetch("data_imp.csv")
                .then((r) => r.text())
                .then((t) => {
                    baseDatos = t
                        .split("\n")
                        .slice(1)
                        .map((f) => {
                            const [location, cpu, monitor, cable] = f.split(",");
                            if (!location || !cable) return null;
                            return {
                                location: location.trim(),
                                cable: cable.trim(),
                            };
                        })
                        .filter(Boolean);
                });

            function barcode(valor) {
                return `https://barcodeapi.org/api/code128/${valor}`;
            }

            /* ===== BUSQUEDA ===== */
            folioInput.addEventListener("input", (e) => {
                const cable = e.target.value.trim();
                const location = locationSelect.value.trim();

                clearTimeout(timeout);

                if (!cable || !location) {
                    mainContainer.classList.remove("expandido");
                    folioLabel.textContent = "";
                    serieBarcode.src = "";
                    loadBot("./Hi_SN_bot.json");
                    return;
                }

                timeout = setTimeout(() => {
                    const item = baseDatos.find((x) => x.location === location && x.cable === cable);

                    if (!item) {
                        folioLabel.textContent = "No encontrado";
                        mainContainer.classList.remove("expandido");
                        serieBarcode.src = "";
                        return;
                    }

                    mainContainer.classList.add("expandido");
                    folioLabel.textContent = item.cable;
                    serieBarcode.src = barcode(item.cable);
                    loadBot("./Confused_SN_bot.json");
                }, 250);
            });

            /* ===== ZOOM BARCODE ===== */
            const overlay = document.getElementById("barcode-overlay");
            const zoomImg = document.getElementById("barcode-zoom");

            document.addEventListener("click", (e) => {
                if (e.target.tagName === "IMG" && e.target.closest(".card")) {
                    zoomImg.src = e.target.src;
                    overlay.style.display = "flex";
                }
            });

            overlay.addEventListener("click", () => {
                overlay.style.display = "none";
                zoomImg.src = "";
            });
        </script>
    </body>
</html>
